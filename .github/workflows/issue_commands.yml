name: Run commands when issues are labeled
on:
  issues:
    types: [labeled]

permissions: {}

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout Actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: 'grafana/grafana-github-actions'
          path: ./actions
          ref: 3c62d35c5a66e730186a338e45aeb8fa784e2d56 # main as of 2026-05-28
          persist-credentials: false
      - name: Install Actions
        run: npm install --omit=dev --prefix ./actions
      - name: Run Commands
        uses: ./actions/commands
        with:
          token: ${{secrets.ISSUE_COMMANDS_TOKEN}}
          configPath: issue_commands
